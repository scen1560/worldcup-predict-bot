name: 每日世界盃預測

on:
  schedule:
    - cron: '0 8 * * *'     # 每日香港時間早上 8:00
  workflow_dispatch:

jobs:
  predict:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: 設定 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: 安裝套件
        run: pip install requests
      
      - name: 執行預測
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHANNEL_ID: "@my_ball_predict_3034"
        run: python predict.py
